    <style>
        /* Base e Prevenção Mobile */
        html, body {
            background-color: #010308;
            color: #f8fafc;
            overflow-x: hidden;
            width: 100%;
            position: relative;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            touch-action: pan-y; /* Bloqueia zoom (pinça) e scroll lateral nativamente */
            overscroll-behavior-x: none; /* Evita o "bounce" lateral no iOS/Android */
        }

        /* Textura de Ruído */
        .noise-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
            mix-blend-mode: overlay;
        }

        /* Iluminação Animada Mais Aparente */
        .soft-glow-1 {
            position: fixed;
            top: -10%; left: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.35) 0%, transparent 70%);
            z-index: -2; pointer-events: none;
            animation: floatGlow1 6s ease-in-out infinite alternate;
        }
        
        .soft-glow-2 {
            position: fixed;
            bottom: -10%; right: -10%; width: 70vw; height: 70vw;
            background: radial-gradient(circle, rgba(0, 85, 255, 0.35) 0%, transparent 70%);
            z-index: -2; pointer-events: none;
            animation: floatGlow2 8s ease-in-out infinite alternate;
        }

        @keyframes floatGlow1 {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.6; }
            100% { transform: translate(50px, 60px) scale(1.5); opacity: 1; }
        }

        @keyframes floatGlow2 {
            0% { transform: translate(0, 0) scale(0.8); opacity: 0.6; }
            100% { transform: translate(-50px, -60px) scale(1.5); opacity: 1; }
        }

        /* Painel Principal com Cantos Cortados e Pulso Forte */
        .cyber-wrapper {
            position: relative; padding: 1px;
            background: linear-gradient(135deg, rgba(0,210,255,0.8) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 70%, rgba(0,85,255,0.8) 100%);
            background-size: 200% 200%;
            clip-path: polygon(40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%, 0 40px);
            animation: panelPulse 4s ease-in-out infinite alternate;
        }

        @keyframes panelPulse {
            0% { box-shadow: 0 0 20px rgba(0, 85, 255, 0.2); background-position: 0% 50%; }
            100% { box-shadow: 0 0 70px rgba(0, 210, 255, 0.6); background-position: 100% 50%; }
        }

        .cyber-panel {
            background: linear-gradient(145deg, rgba(16, 22, 35, 0.6) 0%, rgba(5, 8, 15, 0.8) 100%);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            clip-path: polygon(40px 0, 100% 0, 100% calc(100% - 40px), calc(100% - 40px) 100%, 0 100%, 0 40px);
            position: relative;
        }

        .cyber-panel::before {
            content: ""; position: absolute; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.1'/%3E%3C/svg%3E");
            mix-blend-mode: overlay; pointer-events: none; z-index: 0;
        }

        /* Botões Estilo Tech com Respiração */
        .tech-btn {
            position: relative; background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s ease; z-index: 1; cursor: pointer;
            animation: btnPulse 3s ease-in-out infinite alternate;
        }

        @keyframes btnPulse {
            0% { border-color: rgba(255, 255, 255, 0.05); box-shadow: 0 0 5px rgba(0, 210, 255, 0); }
            100% { border-color: rgba(0, 210, 255, 0.5); box-shadow: 0 0 20px rgba(0, 210, 255, 0.3), inset 0 0 10px rgba(0, 210, 255, 0.15); }
        }

        /* Efeito ao passar o rato (Hover Branco Neutro e Premium) */
        .tech-btn:hover {
            background: rgba(255, 255, 255, 0.05) !important;
            border-color: rgba(255, 255, 255, 0.6) !important;
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.25), inset 0 0 12px rgba(255, 255, 255, 0.08) !important;
            transform: scale(1.02);
            animation-play-state: paused;
        }

        /* Estado "Carregando/Loading" ao clicar no botão (Brilho Branco Intenso) */
        .tech-btn.is-loading {
            background: transparent !important;
            border-color: rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 0 35px rgba(255, 255, 255, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.15) !important;
            transform: scale(1.02) !important;
            animation-play-state: paused !important;
        }

        /* Efeito tátil muito rápido (Active em Branco) */
        .tech-btn:active {
            background: rgba(255, 255, 255, 0.1) !important;
            border-color: rgba(255, 255, 255, 1) !important;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.2) !important;
            transform: scale(0.96) !important;
            transition: all 0.1s ease !important;
        }

        /* Desativar pulso para os botões desligados */
        .tech-btn.opacity-60 { animation: none; box-shadow: none; }

        /* Respiração específica para o WhatsApp (Verde Neon quando inativo) */
        .tech-btn-whatsapp { animation: wppPulse 3s ease-in-out infinite alternate; }

        @keyframes wppPulse {
            0% { border-color: rgba(37, 211, 102, 0.2); box-shadow: 0 0 5px rgba(37, 211, 102, 0); }
            100% { border-color: rgba(37, 211, 102, 0.6); box-shadow: 0 0 20px rgba(37, 211, 102, 0.3), inset 0 0 10px rgba(37, 211, 102, 0.15); }
        }
        /* No hover/active, o WhatsApp flutuante agora herda o brilho Branco da classe base .tech-btn */

        ::-webkit-scrollbar-track { background: #010308; }
        ::-webkit-scrollbar-thumb { background: #0055ff; }
        ::-webkit-scrollbar-thumb:hover { background: #00d2ff; }
    </style>
</head>

    <!-- SCRIPT DE AÇÃO (Lógica da Barra de Progresso em 1s) -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const techLinks = document.querySelectorAll('.tech-link');
            
            techLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    if(this.classList.contains('is-loading')) return;
                    
                    this.classList.add('is-loading');
                    
                    const fill = this.querySelector('.progress-fill');
                    if (fill) {
                        fill.style.transition = 'width 1s linear'; 
                        void fill.offsetWidth;
                        fill.style.width = '100%';
                    }

                    setTimeout(() => {
                        const target = this.getAttribute('target');
                        const url = this.getAttribute('href');
                        
                        if (target === '_blank') {
                            window.open(url, '_blank');
                        } else {
                            window.location.href = url;
                        }
                        
                        setTimeout(() => {
                            this.classList.remove('is-loading');
                            if (fill) {
                                fill.style.transition = 'none';
                                fill.style.width = '0';
                            }
                        }, 500);
                        
                    }, 1000);
                });
            });
        });

        // Funções de Partilha
        function showToast() {
            const toast = document.getElementById('toast-notification');
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }

        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'Victor Draww | Design & 3D',
                    text: 'Acesso ao sistema de portfólio de Victor Draww.',
                    url: window.location.href,
                }).catch((error) => {
                    if (error.name !== 'AbortError') console.log('Erro', error);
                });
            } else {
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast();
                });
            }
        }
    </script>

    <script>
        // Lógica da notificação Toast (Link copiado)
        function showToast() {
            const toast = document.getElementById('toast-notification');
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }

        // Lógica de Partilha do Perfil
        function shareProfile() {
            if (navigator.share) {
                navigator.share({
                    title: 'Victor Draww | Design & Arte',
                    text: 'Conheça o portfólio, serviços e artes do Victor Draww!',
                    url: window.location.href,
                }).catch((error) => {
                    // Ignora erro se o usuário apenas fechou o menu de partilha nativo
                    if (error.name !== 'AbortError') console.log('Erro na partilha', error);
                });
            } else {
                // Fallback robusto para copiar o link
                navigator.clipboard.writeText(window.location.href).then(() => {
                    showToast();
                }).catch(err => {
                    // Fallback legado caso Clipboard API falhe
                    const tempInput = document.createElement('input');
                    tempInput.value = window.location.href;
                    document.body.appendChild(tempInput);
                    tempInput.select();
                    document.execCommand('copy');
                    document.body.removeChild(tempInput);
                    showToast();
                });
            }
        }
    </script>
